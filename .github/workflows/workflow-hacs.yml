name: HACS

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      release_tag:
        required: true
        type: string
      version:
        required: true
        type: string

permissions:
  contents: write

jobs:
  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Apply version override to workspace metadata
        uses: ./.github/actions/apply-version
        with:
          version: ${{ inputs.version }}

      - name: Load HACS archive filename
        id: hacs
        run: |
          HACS_FILENAME="$(python -c 'import json; print(json.load(open("hacs.json", encoding="utf-8"))["filename"])')"
          echo "filename=${HACS_FILENAME}" >> "$GITHUB_OUTPUT"

      - name: Load project metadata
        id: meta
        run: |
          echo "python_version=$(python -c 'from meta_data.project_meta import PYTHON_VERSION; print(PYTHON_VERSION)')" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ steps.meta.outputs.python_version }}

      - name: Prepare HACS archive
        run: |
          python meta_data/configure_hacs.py

      - name: Verify HACS Archive
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync --extra ha --dev
          uv run ruff check dist/hacs
          uv run mypy dist/hacs/

      - name: Build HACS zip
        run: |
          cd dist/hacs
          shopt -s dotglob
          zip -r "../${{ steps.hacs.outputs.filename }}" ./* -x "*/__pycache__/*" "*.pyc" "*.pyo"

      - name: Upload asset to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.release_tag }}" "dist/${{ steps.hacs.outputs.filename }}" --clobber
