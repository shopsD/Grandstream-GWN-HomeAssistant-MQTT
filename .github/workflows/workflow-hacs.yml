name: HACS

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      release_tag:
        required: true
        type: string
      version:
        required: true
        type: string

permissions:
  contents: write

jobs:
  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply version override to workspace metadata
        uses: ./.github/actions/apply-version
        with:
          version: ${{ inputs.version }}

      - name: Load HACS archive filename
        id: hacs
        run: |
          HACS_FILENAME="$(python -c 'import json; print(json.load(open("hacs.json", encoding="utf-8"))["filename"])')"
          echo "filename=${HACS_FILENAME}" >> "$GITHUB_OUTPUT"

      - name: Prepare HACS archive
        run: |
          mkdir -p dist/hacs
          cp -R custom_components/grandstream_gwn/. dist/hacs/
          mkdir -p dist/hacs/gwn
          cp -R gwn/. dist/hacs/gwn/
          find dist/hacs -type d -name "__pycache__" -prune -exec rm -rf {} +
          find dist/hacs -type f \( -name "*.pyc" -o -name "*.pyo" \) -delete

      - name: Rewrite vendored imports
        run: |
          python meta_data/configure_hacs.py

      - name: Build HACS zip
        run: |
          cd dist/hacs
          shopt -s dotglob
          zip -r "../${{ steps.hacs.outputs.filename }}" ./* -x "*/__pycache__/*" "*.pyc" "*.pyo"

      - name: Upload asset to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.release_tag }}" "dist/${{ steps.hacs.outputs.filename }}" --clobber
